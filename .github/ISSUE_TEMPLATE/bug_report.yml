name: Bug report
description: Report a bug or unexpected behavior in elhaz
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a bug report, please search existing issues to avoid duplicates.

        **Security vulnerabilities must not be reported here.** See [SECURITY.md](../SECURITY.md) for the responsible disclosure process.

  - type: input
    id: version
    attributes:
      label: elhaz version
      description: Output of `elhaz --version` or the version shown in `pip show elhaz`.
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `python --version`.
      placeholder: "e.g. 3.12.3"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. macOS 15.2, Ubuntu 24.04"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what went wrong.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps that reliably trigger the bug.
      placeholder: |
        1. Run `elhaz ...`
        2. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen instead.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: |
        Paste any relevant output here. Daemon logs are written to `~/.elhaz/logs/daemon.log`.

        **Remove or redact any AWS credentials, account IDs, ARNs, or other sensitive values before pasting.**
      render: text

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might be relevant — config structure (redacted), environment variables, etc.
