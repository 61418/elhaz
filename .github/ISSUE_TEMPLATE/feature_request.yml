name: Feature request
description: Propose a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, please search existing issues to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve, or what use case does it enable? Be specific.
      placeholder: "e.g. When managing multiple AWS accounts I have to run ... manually each time because ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you would like elhaz to do. Include any CLI flags, config fields, or daemon protocol changes you have in mind.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why you prefer this one.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project does this touch?
      multiple: true
      options:
        - CLI
        - Daemon / socket server
        - Session / credential refresh
        - Config management
        - Models / protocol
        - Documentation
        - CI/CD
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — links, prior art, related issues, etc.
